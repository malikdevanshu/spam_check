name: pytest

on:
  workflow_dispatch:

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show files
        run: pip install uv 

      - name: Install dependencies
        run: uv sync

      - name: Download NLTK data
        run: uv run python -m scripts.data.download_nltk

      - name: Download data
        run: uv run python -m scripts.data.download

     

            




